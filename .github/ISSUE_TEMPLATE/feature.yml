name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or pain motivates this?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: phase
    attributes:
      label: Target phase
      options:
        - "Phase 1 (Tickets)"
        - "Phase 2 (Moderation/AutoMod)"
        - "Phase 3 (Self-Roles/Welcome)"
        - "Phase 4 (Leveling/Logging)"
        - "Phase 5 (Custom commands/Reminders/etc.)"
        - "Unsure"
